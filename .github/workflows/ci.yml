name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mnemosyne-backend
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: mnemosyne
          POSTGRES_USER: mnemosyne
          POSTGRES_PASSWORD: mnemosyne
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U mnemosyne"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
      minio:
        image: bitnamilegacy/minio:2025.7.23-debian-12-r5
        env:
          MINIO_ROOT_USER: mnemosyne
          MINIO_ROOT_PASSWORD: mnemosyne-secret
        ports: ["9000:9000"]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5.4.2
        with:
          python-version: "3.12"
      - run: uv sync --frozen
      - name: Lint
        run: uv run ruff check .
      - name: Typecheck
        run: uv run mypy app
      - name: Unit tests with coverage gate
        run: uv run pytest tests/unit --cov --cov-report=term-missing
      - name: Integration tests
        env:
          DATABASE_URL: postgresql+asyncpg://mnemosyne:mnemosyne@localhost:5432/mnemosyne
          REDIS_URL: redis://localhost:6379/0
          MINIO_ENDPOINT: localhost:9000
        run: uv run pytest tests/integration -m integration
      - name: Docker build
        run: docker build -t mnemosyne-backend:ci .

  openspec:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
      - run: npm install -g @fission-ai/openspec@latest
      - run: openspec validate --all --strict
