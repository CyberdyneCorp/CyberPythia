services:
  mnemosyne-api:
    build:
      context: ./mnemosyne-backend
    container_name: mnemosyne-api
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-mnemosyne}:${POSTGRES_PASSWORD}@postgres:5432/mnemosyne
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-mnemosyne}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      # No reverse proxy in local dev: don't trust X-Forwarded-For, key on peer.
      RATE_LIMIT_TRUSTED_PROXY_HOPS: "0"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request;urllib.request.urlopen('http://localhost:8000/api/v1/health')\""]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    profiles: ["app"]

  mnemosyne-mcp:
    build:
      context: ./mnemosyne-backend
    container_name: mnemosyne-mcp
    command: python -m app.interfaces.mcp.server
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-mnemosyne}:${POSTGRES_PASSWORD}@postgres:5432/mnemosyne
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8100:8100"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import socket;socket.create_connection(('localhost',8100),timeout=3).close()\""]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    profiles: ["app"]

  mnemosyne-worker:
    build:
      context: ./mnemosyne-backend
    container_name: mnemosyne-worker
    command: arq app.infrastructure.queue.worker.WorkerSettings
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-mnemosyne}:${POSTGRES_PASSWORD}@postgres:5432/mnemosyne
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-mnemosyne}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      # No served port: prove the worker process is up and Redis is reachable.
      test: ["CMD-SHELL", "python -c \"import os,redis;redis.from_url(os.environ['REDIS_URL']).ping()\""]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    profiles: ["app"]

  mnemosyne-web:
    build:
      context: ./mnemosyne-web
    container_name: mnemosyne-web
    environment:
      PUBLIC_API_BASE_URL: ${PUBLIC_API_BASE_URL:-http://localhost:8000}
    depends_on:
      mnemosyne-api:
        condition: service_healthy
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:3000/',r=>process.exit(r.statusCode<500?0:1)).on('error',()=>process.exit(1))\""]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    profiles: ["app"]

  postgres:
    image: pgvector/pgvector:pg16
    container_name: mnemosyne-postgres
    environment:
      POSTGRES_DB: mnemosyne
      POSTGRES_USER: ${POSTGRES_USER:-mnemosyne}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      # Bind to loopback only: dev datastores must not be reachable off-host
      # (#61, CWE-732). 5433 on the host: local machines often run their own
      # postgres on 5432.
      - "127.0.0.1:5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mnemosyne"]
      interval: 3s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    container_name: mnemosyne-redis
    # requirepass so the loopback-published port isn't an open, unauthenticated
    # Redis (#61, CWE-732). REDIS_PASSWORD comes from .env.
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}"]
    volumes:
      - redis_data:/data
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$$REDIS_PASSWORD\" ping | grep -q PONG"]
      interval: 3s
      timeout: 3s
      retries: 20
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}

  minio:
    # Pinned to a released tag + digest, not the mutable `latest` (#72, CWE-1104).
    image: minio/minio:RELEASE.2025-04-08T15-41-24Z@sha256:8834ae47a2de3509b83e0e70da9369c24bbbc22de42f2a2eddc530eee88acd1b
    container_name: mnemosyne-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-mnemosyne}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9000/minio/health/ready || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  postgres_data:
  redis_data:
  minio_data:
